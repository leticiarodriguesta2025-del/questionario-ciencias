<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionário — Metodologias de Ensino: Ciências da Natureza</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 700px 500px at 20% 10%, rgba(108,99,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 500px 400px at 80% 80%, rgba(139,92,246,0.09) 0%, transparent 70%);
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    position: relative; z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(108,99,255,0.15);
    border: 1px solid rgba(108,99,255,0.35);
    border-radius: 999px;
    padding: 6px 18px;
    font-size: 13px; font-weight: 600; color: #a78bfa;
    margin-bottom: 16px;
  }
  .title {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 40%, #6c63ff 80%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2; margin-bottom: 10px;
  }
  .subtitle { font-size: 15px; color: #64748b; }

  /* PROGRESS */
  .progress-box {
    background: #1e2133;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    border: 1px solid rgba(108,99,255,0.15);
  }
  .progress-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .progress-label { font-size: 14px; color: #94a3b8; font-weight: 500; }
  .progress-pct { font-size: 14px; font-weight: 700; color: #a78bfa; }
  .progress-track {
    height: 8px; background: #2d3354; border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #6c63ff, #a78bfa);
    border-radius: 999px;
    width: 0%;
    transition: width 0.5s ease;
  }

  /* STATUS PILLS */
  .pills {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .pill {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 16px; border-radius: 999px;
    font-size: 13px; font-weight: 600;
  }
  .pill-correct { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
  .pill-wrong   { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.3);  color: #f87171; }
  .pill-rest    { background: rgba(100,116,139,0.12); border: 1px solid rgba(100,116,139,0.3); color: #94a3b8; }

  /* FILTERS */
  .filters {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .filter-btn {
    padding: 8px 18px; border-radius: 999px; border: 1px solid rgba(108,99,255,0.25);
    background: transparent; color: #94a3b8; font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { background: rgba(108,99,255,0.1); color: #c4b5fd; }
  .filter-btn.active {
    background: linear-gradient(135deg, #6c63ff, #7c3aed);
    color: #fff; border-color: transparent;
  }

  /* CARD */
  .card {
    background: #1e2133;
    border-radius: 20px;
    border: 1px solid rgba(108,99,255,0.12);
    padding: 28px;
    margin-bottom: 20px;
    transition: border-color 0.3s;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #6c63ff, #a78bfa);
    border-radius: 20px 20px 0 0;
  }
  .card.answered-correct { border-color: rgba(34,197,94,0.4); }
  .card.answered-correct::before { background: linear-gradient(90deg,#22c55e,#4ade80); }
  .card.answered-wrong   { border-color: rgba(239,68,68,0.4); }
  .card.answered-wrong::before { background: linear-gradient(90deg,#ef4444,#f87171); }

  .card-head {
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
  }
  .q-badge {
    background: linear-gradient(135deg,#6c63ff,#7c3aed);
    color: #fff; font-size: 12px; font-weight: 700;
    padding: 4px 12px; border-radius: 999px;
    white-space: nowrap;
  }
  .q-topic {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: #64748b;
  }

  .q-ctx {
    background: rgba(108,99,255,0.08);
    border-left: 3px solid #6c63ff;
    border-radius: 0 10px 10px 0;
    padding: 12px 16px;
    font-size: 13px; color: #94a3b8; line-height: 1.7;
    margin-bottom: 14px;
  }

  .q-text {
    font-size: 15px; font-weight: 600; color: #e2e8f0;
    line-height: 1.6; margin-bottom: 18px;
  }

  /* OPTIONS */
  .opt {
    display: flex; align-items: flex-start; gap: 12px;
    width: 100%; padding: 12px 16px; border-radius: 12px;
    border: 1px solid rgba(108,99,255,0.2);
    background: rgba(108,99,255,0.04);
    color: #ffffff !important;
    font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer; text-align: left;
    transition: all 0.18s;
    margin-bottom: 8px;
  }
  .opt span { color: #ffffff !important; }
  .opt .lt  { color: #ffffff !important; }
  .opt:disabled { color: #ffffff !important; opacity: 1; cursor: not-allowed; }
  .opt.correct  { color: #ffffff !important; }
  .opt.wrong    { color: #ffffff !important; }

  .opt:not(:disabled):hover {
    transform: translateX(3px);
    background: rgba(108,99,255,0.12);
    border-color: rgba(108,99,255,0.45);
    color: #ffffff !important;
  }
  .lt {
    min-width: 28px; height: 28px; border-radius: 8px;
    background: rgba(108,99,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #ffffff !important;
    flex-shrink: 0;
  }
  .opt.correct {
    background: rgba(34,197,94,0.12) !important;
    border-color: rgba(34,197,94,0.5) !important;
    color: #ffffff !important;
  }
  .opt.correct .lt { background: rgba(34,197,94,0.3); color: #ffffff !important; }
  .opt.wrong {
    background: rgba(239,68,68,0.12) !important;
    border-color: rgba(239,68,68,0.5) !important;
    color: #ffffff !important;
  }
  .opt.wrong .lt { background: rgba(239,68,68,0.3); color: #ffffff !important; }

  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  .anim-pulse { animation: pulse 0.5s ease; }
  .anim-shake  { animation: shake 0.4s ease; }

  /* FEEDBACK */
  .feedback {
    border-radius: 12px; padding: 14px 16px;
    font-size: 13px; line-height: 1.7; margin-top: 14px;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.fb-correct { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.35); color: #86efac; }
  .feedback.fb-wrong   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.35);  color: #fca5a5; }

  /* RESULT */
  .result-screen {
    display: none;
    background: #1e2133;
    border-radius: 24px;
    border: 1px solid rgba(108,99,255,0.2);
    padding: 40px 32px;
    text-align: center;
    margin-bottom: 28px;
  }
  .result-screen.show { display: block; }
  .result-emoji { font-size: 56px; margin-bottom: 16px; }
  .result-pct {
    font-size: 56px; font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #6c63ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .result-msg { font-size: 17px; color: #94a3b8; margin-bottom: 28px; }
  .result-cards {
    display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .rc {
    background: #151726; border-radius: 14px;
    padding: 16px 24px; min-width: 110px;
    border: 1px solid rgba(108,99,255,0.2);
  }
  .rc-val { font-size: 28px; font-weight: 800; }
  .rc-lab { font-size: 12px; color: #64748b; font-weight: 600; margin-top: 4px; }
  .rc-val.green { color: #4ade80; }
  .rc-val.red   { color: #f87171; }
  .rc-val.blue  { color: #a78bfa; }

  .btn-reset {
    background: linear-gradient(135deg, #6c63ff, #7c3aed);
    color: #fff; border: none; border-radius: 12px;
    padding: 14px 32px; font-size: 15px; font-weight: 700;
    font-family: 'Inter', sans-serif; cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-reset:hover { opacity: 0.85; }

  /* FAB */
  .fab {
    position: fixed; bottom: 24px; right: 24px;
    width: 50px; height: 50px; border-radius: 50%;
    background: linear-gradient(135deg, #6c63ff, #7c3aed);
    color: #fff; border: none; font-size: 20px;
    cursor: pointer; display: none;
    align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(108,99,255,0.4);
    z-index: 100; transition: opacity 0.2s;
  }
  .fab.visible { display: flex; }
  .fab:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="badge">🌿 Metodologias de Ensino</div>
    <h1 class="title">Ciências da Natureza &amp; Sustentabilidade</h1>
    <p class="subtitle" id="subtitle"></p>
  </div>

  <!-- PROGRESS -->
  <div class="progress-box">
    <div class="progress-row">
      <span class="progress-label" id="prog-text">0 de 0 respondidas</span>
      <span class="progress-pct" id="prog-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
  </div>

  <!-- PILLS -->
  <div class="pills">
    <div class="pill pill-correct">✅ Corretas: <span id="cnt-c">0</span></div>
    <div class="pill pill-wrong">❌ Erradas: <span id="cnt-w">0</span></div>
    <div class="pill pill-rest">⏳ Restantes: <span id="cnt-r">0</span></div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('unanswered',this)">Não respondidas</button>
    <button class="filter-btn" onclick="setFilter('correct',this)">Corretas</button>
    <button class="filter-btn" onclick="setFilter('wrong',this)">Erradas</button>
  </div>

  <!-- RESULT SCREEN -->
  <div class="result-screen" id="result-screen">
    <div class="result-emoji" id="res-emoji">🏆</div>
    <div class="result-pct" id="res-pct">0%</div>
    <div class="result-msg" id="res-msg"></div>
    <div class="result-cards">
      <div class="rc"><div class="rc-val green" id="res-c">0</div><div class="rc-lab">Corretas</div></div>
      <div class="rc"><div class="rc-val red"   id="res-w">0</div><div class="rc-lab">Erradas</div></div>
      <div class="rc"><div class="rc-val blue"  id="res-t">0</div><div class="rc-lab">Total</div></div>
    </div>
    <button class="btn-reset" onclick="resetQuiz()">🔄 Refazer Questionário</button>
  </div>

  <!-- CARDS -->
  <div id="cards-container"></div>

</div>

<button class="fab" id="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const LETTERS = ['A','B','C','D','E'];

const Q = [
  {
    n:1, tp:"Marketing Verde",
    ctx:"Antônio Fernando Guimarães afirma que 77% dos anunciantes declara ser fabricante do produto anunciado, porém somente 7% promove os atributos ecológicos específicos dos produtos, sem discutir quais os benefícios ecológicos reais para o consumidor.",
    q:"Em relação ao marketing verde, assinale a alternativa que representa as sentenças CORRETAS:\nI – O marketing verde é importante por incentivar a pesquisa com tecnologia limpa;\nII – O marketing verde contribui para o desenvolvimento sustentável ao promover produtos com menor impacto ao meio ambiente;\nIII – Pode-se afirmar que as mercadorias cujas embalagens apresentam tons que lembram a natureza e textura similar a reciclado é um produto verde.",
    opts:["Apenas a I.","II e III.","I e II.","I, II, III.","I e III."],
    ans:2,
    explanation:"O marketing verde efetivo vai além de embalagens com visual 'ecológico' (sentença III é falsa). As sentenças I e II são corretas pois o marketing verde de fato incentiva tecnologias limpas (I) e promove produtos com menor impacto ambiental contribuindo para o desenvolvimento sustentável (II). A embalagem com cor verde ou textura reciclada não é, por si só, garantia de produto verde."
  },
  {
    n:2, tp:"Desenvolvimento Sustentável",
    ctx:"Para que haja crescimento e desenvolvimento econômico de forma sustentável, é necessário abandonar padrões de consumo e geração de rendas antigas.",
    q:"Sobre as discussões históricas do desenvolvimento sustentável, analise as afirmações:\nI – O Relatório de Brundtland discute a sustentabilidade através de 5 eixos: Eficiência, Escala, Equidade, Autossuficiência e Ética.\nII – A Agenda 21, criada em 1992 durante a Eco-92, também foi um grande passo em direção ao desenvolvimento sustentável.\nIII – A década de 1990 foi uma das mais precárias e na qual menos se discutiu as questões ambientais.\nIV – A Conferência Internacional de Tessalônica (1997) discutiu o consumo responsável e destacou a importância de práticas sustentáveis pelos consumidores.\n\nÉ correto o que se afirma em:",
    opts:["I, II e III, apenas.","I, II e IV, apenas.","I, III e IV, apenas.","II, III e IV, apenas.","I, II, III e IV."],
    ans:1,
    explanation:"A sentença III é falsa: a década de 1990 foi muito ativa em debates ambientais (Eco-92, Agenda 21, Tessalônica). As sentenças I, II e IV são corretas: o Relatório Brundtland usa os 5 eixos citados; a Agenda 21 de 1992 foi marco do desenvolvimento sustentável; e a Conferência de Tessalônica (1997) discutiu o consumo responsável e sustentável."
  },
  {
    n:3, tp:"Meio Ambiente e Sustentabilidade",
    ctx:"O reflorestamento é uma resposta eficiente para lidar com o aquecimento global, pois as plantas absorvem CO₂ na fotossíntese. A restauração da mata também protege nascentes e melhora a qualidade e quantidade das águas.",
    q:"Avalie as asserções:\nI – Promover a sustentabilidade local, através da preservação do meio ambiente com incentivo financeiro para proprietários rurais, conduz à melhoria da qualidade de vida ao criar soluções para problemas regionais de poluição.\nPORQUE\nII – Reduz as áreas impactadas pelos processos de desmatamento, eutrofização, assoreamento e poluição dos rios.\n\nA respeito dessas asserções, assinale a opção correta:",
    opts:[
      "As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa correta da I.",
      "A asserção I é uma proposição verdadeira, e a II é uma proposição falsa.",
      "A asserção I é uma proposição falsa, e a II é uma proposição verdadeira.",
      "As asserções I e II são proposições verdadeiras, e a II é uma justificativa correta da I.",
      "As asserções I e II são proposições falsas."
    ],
    ans:3,
    explanation:"Ambas as asserções são verdadeiras: incentivar financeiramente proprietários rurais para preservação do meio ambiente (I) melhora a qualidade de vida regional. E isso de fato ocorre porque reduz desmatamento, eutrofização, assoreamento e poluição dos rios (II), tornando a II uma justificativa direta da I."
  },
  {
    n:4, tp:"Desenvolvimento Sustentável",
    ctx:"O termo 'desenvolvimento sustentável' foi usado pela primeira vez em 1987, por Gro Harlem Brundtland: 'Desenvolvimento sustentável significa suprir as necessidades do presente sem afetar a habilidade das gerações futuras de suprirem as próprias necessidades'.",
    q:"Analise as afirmações:\nI – Para promover a preservação e a conservação dos patrimônios culturais e naturais, podemos relacioná-los à necessidade de colocar em prática atitudes sustentáveis.\nII – O ecoturismo é um exemplo de turismo sustentável que visa despertar a admiração das pessoas pelo meio ambiente.\nIII – É necessário haver equilíbrio entre desenvolvimento social, preservação ambiental e desenvolvimento econômico para o alcance do desenvolvimento sustentável.\nIV – O turismo ambiental proporciona melhor qualidade de vida às pessoas, sem gerar prejuízos ao meio ambiente.\n\nÉ correto o que se afirma em:",
    opts:["II e III","I, II e III","I, II, III e IV","I e II","II, III e IV"],
    ans:2,
    explanation:"Todas as quatro afirmações são corretas. O desenvolvimento sustentável exige equilíbrio entre as dimensões social, ambiental e econômica (III). Patrimônios culturais e naturais se associam a atitudes sustentáveis (I). O ecoturismo é exemplo de turismo sustentável (II) e o turismo ambiental bem gerido não causa prejuízos ao ambiente (IV)."
  },
  {
    n:5, tp:"Patrimônio Natural",
    ctx:"Em 1972, a Unesco organizou a Convenção do Patrimônio Mundial, Cultural e Natural, definindo patrimônios naturais como monumentos naturais, formações geológicas e zonas de habitat de espécies ameaçadas com valor universal excepcional.",
    q:"Assinale a alternativa que apresenta corretamente exemplos de patrimônios naturais brasileiros:",
    opts:[
      "Reservas de Mata Atlântica da Amazônia; Complexo de Áreas Protegidas dos Andes; Minas de ouro em Ouro Preto",
      "Parque Nacional do Iguaçu; Reservas de Mata Atlântica; Reservas do Cerrado; Complexo de Áreas Protegidas do Pantanal",
      "Reservas de Mata Atlântica; Parque Nacional do Iguaçu; Cidade histórica de Tiradentes; Minas de ouro em Ouro Preto; Complexo de Áreas Protegidas dos Andes.",
      "Parque Nacional do Iguaçu; Reservas do Cerrado; Cidade histórica de Tiradentes; Minas de ouro em Ouro Preto; Complexo de Áreas Protegidas dos Andes.",
      "Reservas do Cerrado; Reservas de Mata Atlântica da Amazônia; Complexo de Áreas Protegidas dos Andes"
    ],
    ans:1,
    explanation:"Os patrimônios naturais brasileiros reconhecidos pela UNESCO incluem o Parque Nacional do Iguaçu, as Reservas de Mata Atlântica, as Reservas do Cerrado e o Complexo de Áreas Protegidas do Pantanal. Minas de ouro em Ouro Preto e a Cidade histórica de Tiradentes são patrimônios CULTURAIS, não naturais. Os Andes não ficam no Brasil."
  },
  {
    n:6, tp:"Educação Ambiental na Ed. Infantil",
    ctx:"A educação ambiental ensinada nas escolas não deve ser tratada como uma área específica, mas trabalhada em todas as disciplinas, incentivando a participação do aluno e relacionando as aprendizagens ao seu cotidiano.",
    q:"A respeito da Educação Ambiental na Educação Infantil, assinale a opção que apresenta APENAS a afirmação correta:",
    opts:[
      "A Educação Ambiental deve ser trabalhada na Educação Infantil como disciplina isolada e específica, conforme previsto no RCNEI.",
      "A Educação Ambiental deve ser trabalhada na Educação Infantil, inclusive o RCNEI prevê em seus objetivos: 'observar e explorar o ambiente com atitude de curiosidade, percebendo-se cada vez mais como integrante, dependente e agente transformador do meio ambiente'.",
      "A Educação Ambiental deve ser trabalhada na Educação Infantil, assim como no Ensino Fundamental, como disciplina específica do currículo, conforme previsto na LDB.",
      "A Educação Ambiental não deve ser trabalhada na Educação Infantil, pois as crianças não possuem maturidade suficiente.",
      "A Educação Ambiental não deve ser trabalhada na Educação Infantil, pois o RCNEI não prevê esse tema."
    ],
    ans:1,
    explanation:"O RCNEI (Referencial Curricular para a Educação Infantil) prevê explicitamente que as crianças devem 'observar e explorar o ambiente com atitude de curiosidade, percebendo-se como integrante, dependente e agente transformador do meio ambiente'. A EA não deve ser disciplina isolada, e crianças têm capacidade de compreender o tema de forma lúdica."
  },
  {
    n:7, tp:"Educação Ambiental na Escola",
    ctx:"Um dos principais problemas encontrados no ensino da educação ambiental é que as crianças pensam que o meio ambiente é composto apenas de fauna e flora e não sabem onde encaixar o ser humano.",
    q:"Avalie as asserções:\nI – Quando são implantados projetos de educação ambiental nas escolas, é extremamente importante que as crianças participem ativamente e que não sejam conduzidos apenas pelos professores.\nPORQUE\nII – As crianças tendem a ficar muito tempo dentro das salas de aula, afastadas do contato com o meio ambiente. Logo, essas atividades são importantes por trazerem dinamicidade às aulas, aumentando a interação dos alunos com o meio ambiente.\n\nA respeito dessas asserções, assinale a opção correta:",
    opts:[
      "A asserção I é uma proposição falsa, e a II é uma proposição verdadeira.",
      "As asserções I e II são proposições verdadeiras, e a II é uma justificativa correta da I.",
      "A asserção I é uma proposição verdadeira, e a II é uma proposição falsa.",
      "As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa correta da I.",
      "As asserções I e II são proposições falsas."
    ],
    ans:3,
    explanation:"Ambas as proposições são verdadeiras. A participação ativa das crianças nos projetos de EA (I) é fundamental. A II também é verdadeira (crianças ficam muito tempo em sala, e as atividades externas aumentam dinamismo e interação). Porém, a II não justifica diretamente a I, pois a razão para a participação ativa das crianças é pedagógica e não apenas pela falta de contato com o meio ambiente."
  },
  {

// STATE
const state = Array(Q.length).fill(null); // null | 'correct' | 'wrong'
let currentFilter = 'all';

// INIT
function init() {
  document.getElementById('subtitle').textContent = `${Q.length} questões sobre Sustentabilidade, Educação Ambiental e Metodologias de Ensino`;
  document.getElementById('cnt-r').textContent = Q.length;
  renderCards();
  updateProgress();
}

function renderCards() {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  Q.forEach((q, i) => {
    const card = buildCard(q, i);
    container.appendChild(card);
  });
  applyFilter(currentFilter);
}

function buildCard(q, idx) {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${idx}`;

  const head = `<div class="card-head">
    <span class="q-badge">Questão ${q.n}</span>
    <span class="q-topic">${q.tp}</span>
  </div>`;

  const ctx = q.ctx ? `<div class="q-ctx">${q.ctx}</div>` : '';

  const qText = q.q.replace(/\n/g,'<br>');

  let opts = '';
  q.opts.forEach((o,j) => {
    opts += `<button class="opt" id="opt-${idx}-${j}" onclick="answer(${idx},${j})">
      <span class="lt">${LETTERS[j]}</span>
      <span>${o}</span>
    </button>`;
  });

  const feedback = `<div class="feedback" id="fb-${idx}"></div>`;

  card.innerHTML = head + ctx + `<div class="q-text">${qText}</div>` + opts + feedback;
  return card;
}

function answer(idx, chosen) {
  if (state[idx] !== null) return;

  const correct = Q[idx].ans;
  const isCorrect = chosen === correct;
  state[idx] = isCorrect ? 'correct' : 'wrong';

  // Disable all options
  for (let j = 0; j < Q[idx].opts.length; j++) {
    const btn = document.getElementById(`opt-${idx}-${j}`);
    btn.disabled = true;
    btn.style.cursor = 'not-allowed';
  }

  // Mark chosen
  const chosenBtn = document.getElementById(`opt-${idx}-${chosen}`);
  if (isCorrect) {
    chosenBtn.classList.add('correct');
    chosenBtn.classList.add('anim-pulse');
  } else {
    chosenBtn.classList.add('wrong');
    chosenBtn.classList.add('anim-shake');
    // Mark correct
    document.getElementById(`opt-${idx}-${correct}`).classList.add('correct');
  }

  // Card border
  const card = document.getElementById(`card-${idx}`);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  // Feedback
  const fb = document.getElementById(`fb-${idx}`);
  if (isCorrect) {
    fb.className = 'feedback show fb-correct';
    fb.innerHTML = '✅ <strong>Parabéns! Resposta correta!</strong>';
  } else {
    const chosenLetter = LETTERS[chosen];
    const correctLetter = LETTERS[correct];
    const chosenText = Q[idx].opts[chosen];
    const correctText = Q[idx].opts[correct];
    fb.className = 'feedback show fb-wrong';
    fb.innerHTML = `❌ <strong>Incorreto.</strong> A alternativa ${chosenLetter}) <em>"${chosenText}"</em> está errada. A correta é ${correctLetter}) <em>"${correctText}"</em> porque: ${Q[idx].explanation}`;
  }

  updateProgress();
  checkFinished();
}

function updateProgress() {
  const answered = state.filter(s => s !== null).length;
  const correct  = state.filter(s => s === 'correct').length;
  const wrong    = state.filter(s => s === 'wrong').length;
  const rest     = Q.length - answered;
  const pct      = Q.length > 0 ? Math.round(answered / Q.length * 100) : 0;

  document.getElementById('prog-text').textContent = `${answered} de ${Q.length} respondidas`;
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('cnt-c').textContent = correct;
  document.getElementById('cnt-w').textContent = wrong;
  document.getElementById('cnt-r').textContent = rest;
}

function checkFinished() {
  const answered = state.filter(s => s !== null).length;
  if (answered < Q.length) return;
  setTimeout(showResult, 1200);
}

function showResult() {
  const correct = state.filter(s => s === 'correct').length;
  const wrong   = state.filter(s => s === 'wrong').length;
  const pct     = Math.round(correct / Q.length * 100);

  let emoji, msg;
  if (pct === 100) { emoji='🏆'; msg='Perfeito! Você dominou todo o conteúdo!'; }
  else if (pct >= 80) { emoji='🎉'; msg='Excelente desempenho! Continue assim!'; }
  else if (pct >= 60) { emoji='👍'; msg='Bom resultado! Revise os temas com erros.'; }
  else if (pct >= 40) { emoji='📚'; msg='Vale a pena rever o conteúdo com calma.'; }
  else { emoji='💪'; msg='Não desanime! Estude mais e tente novamente.'; }

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-pct').textContent   = pct + '%';
  document.getElementById('res-msg').textContent   = msg;
  document.getElementById('res-c').textContent     = correct;
  document.getElementById('res-w').textContent     = wrong;
  document.getElementById('res-t').textContent     = Q.length;
  document.getElementById('result-screen').classList.add('show');
  window.scrollTo({top:0, behavior:'smooth'});
}

function resetQuiz() {
  state.fill(null);
  document.getElementById('result-screen').classList.remove('show');
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn').classList.add('active');
  renderCards();
  updateProgress();
  window.scrollTo({top:0, behavior:'smooth'});
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter(f);
}

function applyFilter(f) {
  Q.forEach((q, i) => {
    const card = document.getElementById(`card-${i}`);
    if (!card) return;
    let show = true;
    if (f === 'unanswered') show = state[i] === null;
    else if (f === 'correct') show = state[i] === 'correct';
    else if (f === 'wrong')   show = state[i] === 'wrong';
    card.style.display = show ? '' : 'none';
  });
}

// FAB
window.addEventListener('scroll', () => {
  document.getElementById('fab').classList.toggle('visible', window.scrollY > 400);
});

init();
</script>
